services:
  discographic:
    build: .
    container_name: discographic
    ports:
      - "${HOST_IP:-127.0.0.1}:${PORT:-3800}:3800"
    environment:
      PORT: ${PORT:-3800}
      SESSION_SECRET: ${SESSION_SECRET:-discographic-dev-secret}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - discographic-data:/app/data
    restart: unless-stopped

volumes:
  discographic-data:
