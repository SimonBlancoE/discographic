services:
  discographic:
    build: .
    container_name: discographic
    ports:
      - "3800:3800"
    environment:
      PORT: 3800
      SESSION_SECRET: ${SESSION_SECRET:-discographic-dev-secret}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - discographic-data:/app/data
    restart: unless-stopped

volumes:
  discographic-data:
